<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada | Makewell Comunicação</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://makewell.com.br/">
<meta name="theme-color" content="#F07820">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #C8922A; --gold-light: #F07820; --dark: #0a0a0a; }
  body { background: var(--dark); color: #fff; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; overflow: hidden; }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particles span { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(240,120,32,.5); animation: float var(--d) ease-in-out infinite; left: var(--x); top: var(--y); opacity: 0; }
  @keyframes float { 0%{opacity:0;transform:translateY(0) scale(1)} 20%{opacity:1} 80%{opacity:.6} 100%{opacity:0;transform:translateY(-100px) scale(0)} }

  .content { position: relative; z-index: 1; max-width: 520px; }
  .logo { height: 44px; width: auto; margin-bottom: 56px; }
  .code {
    font-size: clamp(96px, 20vw, 160px);
    font-weight: 900;
    letter-spacing: -6px;
    line-height: 1;
    background: linear-gradient(90deg, #F07820, #F5A623, #F07820, #C8922A, #F07820);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
    margin-bottom: 24px;
  }
  @keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
  h1 { font-size: clamp(20px, 4vw, 28px); font-weight: 800; color: #fff; margin-bottom: 16px; letter-spacing: -0.5px; }
  p { font-size: 16px; color: #888; line-height: 1.75; margin-bottom: 44px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; background: var(--gold-light); color: #fff; text-decoration: none; padding: 16px 34px; border-radius: 8px; font-weight: 800; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; transition: background .2s, transform .2s; }
  .btn:hover, .btn:active { background: var(--gold); transform: translateY(-2px); }

  @media (max-width: 480px) { .code { letter-spacing: -3px; } }
</style>
</head>
<body ontouchstart="">
  <div class="particles" id="particles"></div>
  <div class="content">
    <a href="/" aria-label="Makewell Comunicação — página inicial"><img src="images/logo-makewell-branca.webp" alt="Makewell Comunicação" class="logo" width="176" height="44"></a>
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você buscou não existe ou foi movida.<br>Volte para o início e encontre o que precisa.</p>
    <a href="/" class="btn">← Voltar ao início</a>
  </div>
  <script>
    const p = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('span');
      s.style.setProperty('--x', Math.random() * 100 + '%');
      s.style.setProperty('--y', (20 + Math.random() * 70) + '%');
      s.style.setProperty('--d', (5 + Math.random() * 8).toFixed(1) + 's');
      s.style.animationDelay = (Math.random() * 8).toFixed(1) + 's';
      p.appendChild(s);
    }
  </script>
</body>
</html>
